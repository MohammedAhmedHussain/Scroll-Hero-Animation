<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Car Scroll Animation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow: hidden;
        }

        body {
            font-family: 'Arial Black', Arial, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #98D8E8 50%, #E0F6FF 100%);
            position: relative;
            overflow: hidden;
        }

        .scroll-container {
            height: 400vh;
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
        }

        .car {
            position: fixed;
            bottom: 15vh;
            left: 0;
            width: 350px;
            height: auto;
            z-index: 10;
            opacity: 1;
        }

        .scroll-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
        }

        .main-text {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            color: #000000;
            opacity: 0;
            margin-bottom: 0.5rem;
        }

        .email {
            font-size: clamp(1rem, 3vw, 1.8rem);
            font-weight: 600;
            color: #000000;
            opacity: 0;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="scroll-container"></div>
    
    <div class="scroll-text">
        <div class="main-text">WELCOME ITZFIZZ</div>
        <div class="email">@mohdahmedhussain.59@gmail.com</div>
    </div>
    
    <img src="F1-car.png" alt="F1 Car" class="car">

    <script>
        let scrollProgress = 0;
        const maxScroll = 300;

        function updateAnimations(progress) {
            // Car movement - SLOWER
            const car = document.querySelector('.car');
            const carWidth = car.offsetWidth;
            const windowWidth = window.innerWidth;
            const maxX = windowWidth - carWidth;
            
            gsap.to('.car', {
                x: progress * maxX,
                duration: 0.8,  // SLOWER car (was 0.2)
                ease: "power1.out"
            });

            // Text appearance (unchanged speed)
            const opacity = Math.min(1, progress * 2);
            
            gsap.to('.main-text', {
                opacity: opacity,
                scale: 1 + progress * 0.05,
                duration: 0.2
            });
            
            gsap.to('.email', {
                opacity: opacity,
                y: -progress * 5,
                duration: 0.2
            });
        }

        // Mouse wheel
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            scrollProgress += e.deltaY * 2;
            scrollProgress = Math.max(0, Math.min(maxScroll, scrollProgress));
            updateAnimations(scrollProgress / maxScroll);
        }, { passive: false });

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                scrollProgress += 80;
            } else if (e.key === 'ArrowUp') {
                scrollProgress -= 80;
            }
            scrollProgress = Math.max(0, Math.min(maxScroll, scrollProgress));
            updateAnimations(scrollProgress / maxScroll);
            
            // Debug spacebar
            if (e.code === 'Space') {
                scrollProgress = maxScroll / 2;
                updateAnimations(0.5);
            }
        });

        // Touch
        let startY = 0;
        document.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const currentY = e.touches[0].clientY;
            const delta = startY - currentY;
            scrollProgress += delta * 2;
            scrollProgress = Math.max(0, Math.min(maxScroll, scrollProgress));
            startY = currentY;
            updateAnimations(scrollProgress / maxScroll);
        }, { passive: false });

        // Initial state
        gsap.set('.car', { x: 0 });
        gsap.set('.main-text', { opacity: 0, scale: 1 });
        gsap.set('.email', { opacity: 0, y: 0 });
    </script>
</body>
</html>
